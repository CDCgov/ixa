# Derived from: https://github.com/actions/starter-workflows/blob/main/pages/mdbook.yml
#
name: Deploy doc to Pages

on:
  # Runs on pushes of release tags.
  push:
    tags:
      - "ixa-v*"

  # Allows you to publish docs for a specific release tag from the Actions tab.
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example ixa-v2.0.0-beta2.5"
        required: true
        type: string

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Validate release tag
        if: github.event_name == 'workflow_dispatch'
        env:
          DOCS_TAG: ${{ inputs.tag }}
        run: |
          case "$DOCS_TAG" in
            ixa-v*) ;;
            *)
              echo "::error::Docs can only be published from ixa-v* release tags."
              exit 1
              ;;
          esac

      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}
      - name: Setup environment
        uses: ./.github/actions/setup-env

      - name: Build docs
        run: mise run docs

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./website

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
