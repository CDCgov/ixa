name: Checks and tests

on:
  push:
    branches: main
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Setup environment
        uses: ./.github/actions/setup-env

      - name: Linting and formatting
        run: mise run precommit

  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Setup environment
        uses: ./.github/actions/setup-env

      - name: Unit tests
        run: mise run test:unit

  wasm-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Setup environment
        uses: ./.github/actions/setup-env

      - name: WASM tests
        run: mise run test:wasm
        env:
          RUSTFLAGS: '--cfg getrandom_backend="wasm_js"'

  hyperfine-smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Setup environment
        uses: ./.github/actions/setup-env

      - name: Check single run for hyperfine
        run: mise run test:hyperfine

  examples:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Setup environment
        uses: ./.github/actions/setup-env

      - name: Run examples
        run: mise run examples

  book-example:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Setup environment
        uses: ./.github/actions/setup-env

      - name: Build book example
        run: mise run test:book

  docs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Setup environment
        uses: ./.github/actions/setup-env

      - name: Build docs
        run: mise run docs

  cargo-toml-changes:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.changed.outputs.changed }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for Cargo.toml changes
        id: changed
        shell: bash
        run: |
          set -euo pipefail

          case "${{ github.event_name }}" in
            pull_request)
              base="${{ github.event.pull_request.base.sha }}"
              head="${{ github.sha }}"
              ;;
            push)
              base="${{ github.event.before }}"
              head="${{ github.sha }}"
              ;;
            *)
              echo "changed=true" >> "${GITHUB_OUTPUT}"
              exit 0
              ;;
          esac

          if [[ "${base}" == "0000000000000000000000000000000000000000" ]]; then
            echo "changed=true" >> "${GITHUB_OUTPUT}"
          else
            changed_files="$(git diff --name-only "${base}" "${head}" -- 'Cargo.toml' '**/Cargo.toml')"
            if [[ -n "${changed_files}" ]]; then
              echo "changed=true" >> "${GITHUB_OUTPUT}"
            else
              echo "changed=false" >> "${GITHUB_OUTPUT}"
            fi
          fi

  msrv:
    runs-on: ubuntu-latest
    needs: cargo-toml-changes
    if: ${{ needs.cargo-toml-changes.outputs.changed == 'true' }}

    steps:
      - uses: actions/checkout@v6
      - name: Setup environment
        uses: ./.github/actions/setup-env

      - name: Verify MSRV
        run: mise run check:msrv

  setup-new-project:
    uses: ./.github/workflows/test-setup-new-project.yaml

  all-green:
    runs-on: ubuntu-latest
    needs:
      - lint
      - unit-tests
      - wasm-tests
      - hyperfine-smoke
      - examples
      - book-example
      - docs
      - cargo-toml-changes
      - msrv
      - setup-new-project
    if: ${{ always() }}
    steps:
      - name: Verify all checks passed
        run: |
          set -euo pipefail

          results=(
            lint:${{ needs.lint.result }}
            unit-tests:${{ needs.unit-tests.result }}
            wasm-tests:${{ needs.wasm-tests.result }}
            hyperfine-smoke:${{ needs.hyperfine-smoke.result }}
            examples:${{ needs.examples.result }}
            book-example:${{ needs.book-example.result }}
            docs:${{ needs.docs.result }}
            cargo-toml-changes:${{ needs.cargo-toml-changes.result }}
            msrv:${{ needs.msrv.result }}
            setup-new-project:${{ needs.setup-new-project.result }}
          )

          failed=0
          for pair in "${results[@]}"; do
            job="${pair%%:*}"
            result="${pair#*:}"
            echo "${job}: ${result}"
            if [ "${job}" = "msrv" ] && [ "${result}" = "skipped" ]; then
              continue
            fi
            if [ "${result}" != "success" ]; then
              failed=1
            fi
          done

          if [ "${failed}" -ne 0 ]; then
            echo "One or more checks failed."
            exit 1
          fi
